<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pling — Support</title>
  <meta name="description" content="Get help with Pling. Report bugs, request features, or send feedback.">
  <meta name="theme-color" content="#121214">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #121214;
      --fg: #E8E8EC;
      --fg-dim: #7A7C87;
      --accent: #FF6C37;
      --surface: #1a1a1e;
      --border: rgba(255, 255, 255, 0.08);
      --font: 'Geist', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: #fff; }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(18, 18, 20, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 14px 0;
    }

    nav .container {
      max-width: 900px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo .icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .logo .wordmark {
      height: 20px;
      width: auto;
    }

    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-right > a { font-size: 0.85rem; color: var(--fg-dim); transition: color 0.15s; }
    .nav-right > a:hover { color: var(--fg); }
    .hamburger { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
    .hamburger svg { width: 22px; height: 22px; }
    .hamburger line { stroke: var(--fg-dim); stroke-width: 2; stroke-linecap: round; transition: stroke 0.15s; }
    .hamburger:hover line { stroke: var(--fg); }
    .nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; opacity: 0; visibility: hidden; transition: opacity 0.25s, visibility 0.25s; }
    .nav-overlay.open { opacity: 1; visibility: visible; }
    .nav-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 260px; background: #1a1a1e; border-left: 1px solid var(--border); z-index: 201; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; padding: 20px 0; }
    .nav-overlay.open .nav-panel { transform: translateX(0); }
    .nav-panel-header { display: flex; justify-content: flex-end; padding: 0 20px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .nav-close { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
    .nav-close svg { width: 20px; height: 20px; }
    .nav-close line { stroke: var(--fg-dim); stroke-width: 2; stroke-linecap: round; }
    .nav-close:hover line { stroke: var(--fg); }
    .nav-panel a { display: block; padding: 12px 24px; font-size: 0.9rem; color: var(--fg-dim); text-decoration: none; transition: color 0.15s, background 0.15s; }
    .nav-panel a:hover { color: var(--fg); background: rgba(255,255,255,0.04); }

    /* Content */
    .content {
      padding: 120px 0 60px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--fg-dim);
      margin-bottom: 32px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--fg-dim);
      margin-bottom: 6px;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .type-btn {
      padding: 10px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--fg-dim);
      font-family: var(--font);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .type-btn:hover { border-color: var(--accent); color: var(--fg); }
    .type-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    textarea, input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-family: var(--font);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea { min-height: 120px; resize: vertical; }
    textarea:focus, input[type="email"]:focus { border-color: var(--accent); }

    textarea::placeholder, input::placeholder { color: var(--fg-dim); opacity: 0.4; }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.3; cursor: default; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
    }

    .toast.success { background: #34d399; color: #000; }
    .toast.error { background: #ef4444; color: #fff; }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Footer */
    footer {
      padding: 40px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
      font-size: 0.75rem;
      color: #333;
    }

    footer .container { max-width: 900px; }
    footer a { color: var(--fg-dim); }

    @media (max-width: 600px) {
      .type-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav>
  <div class="container">
    <a class="logo" href="/"><img class="icon" src="apple-touch-icon.png" alt="Pling"><img class="wordmark" src="pling-wordmark.png" alt="Pling"></a>
    <div class="nav-right">
      <a href="docs.html">Docs</a>
      <a href="https://apps.apple.com/app/pling/id6744640074" style="font-size:0.78rem;font-weight:600;color:var(--bg);background:var(--accent);padding:7px 16px;border-radius:8px;">Download</a>
      <button class="hamburger" onclick="document.getElementById('nav-overlay').classList.add('open')" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
    </div>
  </div>
</nav>

<div class="nav-overlay" id="nav-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="nav-panel">
    <div class="nav-panel-header">
      <button class="nav-close" onclick="document.getElementById('nav-overlay').classList.remove('open')" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none"><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <a href="/">Home</a>
    <a href="/#features">Features</a>
    <a href="/#how">How it works</a>
    <a href="docs.html">Docs</a>
    <a href="support.html">Support</a>
    <a href="https://github.com/Jeramo/pling">GitHub</a>
    <a href="mailto:hello@plingpush.com">Contact</a>
  </div>
</div>

<div class="content">
  <div class="container">
    <h1>Support</h1>
    <p class="subtitle">Report a bug, request a feature, or send feedback.</p>

    <form id="supportForm" onsubmit="return handleSubmit(event)">
      <input type="hidden" name="app" value="Pling">
      <input type="hidden" name="source" value="website">

      <div class="form-group">
        <label>Type</label>
        <div class="type-grid">
          <button type="button" class="type-btn active" data-type="general" onclick="selectType(this)">General</button>
          <button type="button" class="type-btn" data-type="bug" onclick="selectType(this)">Bug</button>
          <button type="button" class="type-btn" data-type="feature" onclick="selectType(this)">Feature</button>
          <button type="button" class="type-btn" data-type="improvement" onclick="selectType(this)">Improvement</button>
        </div>
        <input type="hidden" name="type" id="feedbackType" value="general">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Describe the issue or idea..." required></textarea>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Send</button>
    </form>
  </div>
</div>

<div class="toast success" id="successToast">Sent — thanks for the feedback</div>
<div class="toast error" id="errorToast">Something went wrong. Try again.</div>

<footer>
  <div class="container">
    <p>Pling &mdash; built by <a href="https://github.com/Jeramo">Jeramo</a> &middot; <a href="privacy.html">Privacy</a></p>
  </div>
</footer>

<script>
function selectType(el) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('feedbackType').value = el.dataset.type;
}

function showToast(id, ms) {
  const t = document.getElementById(id);
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), ms || 2500);
}

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const form = document.getElementById('supportForm');
  const data = Object.fromEntries(new FormData(form));

  try {
    const res = await fetch('https://formspree.io/f/xkopzoyz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      showToast('successToast');
      form.reset();
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-type="general"]').classList.add('active');
      document.getElementById('feedbackType').value = 'general';
    } else {
      showToast('errorToast');
    }
  } catch {
    showToast('errorToast');
  }

  btn.disabled = false;
  btn.textContent = 'Send';
  return false;
}
</script>
</body>
</html>
